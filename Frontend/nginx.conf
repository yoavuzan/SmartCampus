server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Handle API proxying if you want to avoid CORS entirely
    # location /api/ {
    #    proxy_pass http://server:8000/;
    # }
}
